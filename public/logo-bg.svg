<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 120" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap');
      .text-base { font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 700; fill: #f8fafc; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; fill: #cbd5e1; letter-spacing: 0.45em; text-transform: uppercase; }
    </style>
    <linearGradient id="bg-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#022c22"/> <!-- emerald-950 -->
      <stop offset="100%" stop-color="#064e3b"/> <!-- emerald-900 -->
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-emerald)" rx="8" />
  
  <!-- Text -->
  <text x="20" y="80" class="text-base">E</text>
  <text x="75" y="80" class="text-base">C</text>
  <text x="135" y="80" class="text-base">N</text>
  
  <!-- Subtitle -->
  <text x="24" y="108" class="text-sub">Tech &amp; Equity</text>
</svg>
