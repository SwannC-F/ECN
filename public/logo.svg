<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 120" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap');
      .text-base { font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 700; fill: #f8fafc; }
      .text-accent { fill: #10B981; } /* emerald-500 */
      .text-sub { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; fill: #94a3b8; letter-spacing: 0.45em; text-transform: uppercase; }
    </style>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <text x="10" y="80" class="text-base text-accent" filter="url(#glow)">E</text>
  <text x="65" y="80" class="text-base">C</text>
  <text x="125" y="80" class="text-base">N</text>
  
  <!-- Subtitle -->
  <text x="14" y="108" class="text-sub">Tech &amp; Equity</text>
</svg>
