<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap');
      .text-icon { font-family: 'Playfair Display', serif; font-size: 160px; font-weight: 700; fill: #f8fafc; text-anchor: middle; dominant-baseline: central; letter-spacing: 0.05em; }
    </style>
    <linearGradient id="bg-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-emerald)" />
  
  <!-- Text -->
  <text x="256" y="256" class="text-icon">ECN</text>
</svg>
